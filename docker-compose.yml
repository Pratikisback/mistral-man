version: "3.9"

services:

  app:
    build: .
    container_name: rag_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - ollama
    volumes:
      - .:/app
    restart: always

  postgres:
    image: ankane/pgvector
    container_name: rag_postgres
    environment:
      POSTGRES_DB: vectordb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data   
    restart: always

  redis:
    image: redis:7
    container_name: rag_redis
    ports:
      - "6379:6379"
    restart: always

  ollama:
    image: ollama/ollama
    container_name: rag_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    restart: always

volumes:
  pgdata:      
  ollama: